      <tbody>
      ${users.map(u=>{
        const last = u.lastUpdatedAt ? new Date(u.lastUpdatedAt).toLocaleString() : "—";
        const self = sync.user && u.username === sync.user.username;
        const isAdmin = u.role === "admin";
        const isManager = u.role === "manager";
        // Manager checkbox shown only for non-admin, non-self rows.
        const mgrCell = (self || isAdmin)
          ? `<span class="hint" style="font-size:11px">—</span>`
          : `<input type="checkbox" data-act="toggle-manager" data-user="${escapeHtml(u.username)}" ${isManager?"checked":""} aria-label="Manager role" />`;
        return `<tr>
          <td><b>${escapeHtml(u.username)}</b>${self?' <span class="tag">you</span>':''}</td>
          <td><span class="tag">${escapeHtml(u.role)}</span></td>
          <td style="text-align:center">${mgrCell}</td>
          <td>${escapeHtml(last)}</td>
          <td style="text-align:right">
            ${!self ? `<button class="ghost" data-act="view" data-user="${escapeHtml(u.username)}">View</button>` : ''}
            <button class="ghost" data-act="reset" data-user="${escapeHtml(u.username)}">Reset pw</button>
            ${!self ? `<button class="ghost danger" data-act="delete" data-user="${escapeHtml(u.username)}">Delete</button>` : ''}
          </td>
        </tr>`;
      }).join("")}
      </tbody>
    </table>`;
  if(select){
    select.innerHTML = `<option value="">— pick a user —</option>` +
      users
        .filter(u => !sync.user || u.username !== sync.user.username)
        .map(u => `<option value="${escapeHtml(u.username)}">${escapeHtml(u.username)}</option>`)
        .join("");
  }
  panel.querySelectorAll("button[data-act]").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      const act = btn.dataset.act;
      const un  = btn.dataset.user;
      if(act === "view"){
        await enterViewAs(un);
      } else if(act === "reset"){
        const np = prompt(`New password for ${un}:`);
        if(!np) return;
        if(np.length < 4){ alert("Password must be at least 4 characters."); return; }
        try{ await adminResetPassword(un, np); toast(`Reset password for ${un}.`); }
        catch(e){ alert("Reset failed: " + e.message); }
      } else if(act === "delete"){
        if(!confirm(`Delete user "${un}" and all their data? Cannot be undone.`)) return;
        if(!confirm(`Really delete "${un}"?`)) return;
        try{ await adminDeleteUser(un); toast(`Deleted ${un}.`); refreshUsersPanel(); }
        catch(e){ alert("Delete failed: " + e.message); }
      }
    });
  });
  panel.querySelectorAll("input[data-act='toggle-manager']").forEach(cb=>{
    cb.addEventListener("change", async ()=>{
      const un = cb.dataset.user;
      const newRole = cb.checked ? "manager" : "user";
      cb.disabled = true;
      try{
        await adminSetUserRole(un, newRole);
        toast(`${un} is now ${newRole}.`);
        refreshUsersPanel();
      }catch(e){
        alert("Couldn't change role: " + (e.message || e));
        cb.checked = !cb.checked; // revert
      }finally{
        cb.disabled = false;
      }
    });
  });
}
function exportData(){
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const ts = new Date().toISOString().slice(0,10);
  a.href = url; a.download = `doty-backup-${ts}.json`;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 100);
  toast("Backup downloaded.");
}
function importData(ev){
  const file = ev.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const data = JSON.parse(reader.result);
      if(!data || !Array.isArray(data.projects)) throw new Error("Missing projects[]");
      if(!confirm(`Import backup with ${data.projects.length} project(s)? This will replace your current data.`)) return;
      state = migrate(data);
      save();
      view = "today"; openProjectId = null;
      render(); toast("Backup imported.");
    }catch(e){
      alert("Invalid backup file: "+e.message);
    } finally {
      ev.target.value = "";
    }
  };
  reader.readAsText(file);
}

/* ---------- Quick-add bar plumbing ---------- */
function syncQuickAddBar(){
  const proj = document.getElementById("qaProj");
  if(!proj) return;
  const cur = proj.value || qaLastProjectId || state.projects[0]?.id;
  proj.innerHTML = state.projects.length
    ? state.projects.map(p=>`<option value="${p.id}">${escapeHtml(p.name)}</option>`).join("")
    : `<option value="">(no projects)</option>`;
  if(cur && state.projects.some(p=>p.id===cur)) proj.value = cur;
  const kind = document.getElementById("qaKind").value;
  document.getElementById("qaSchedRow").style.display = (kind==="schedule") ? "flex" : "none";
  document.getElementById("qaBuyRow").style.display = (kind==="buy") ? "flex" : "none";
  // "Share with everyone" is admin/manager only.
  const role = sync.user && sync.user.role;
  const canShare = role === "admin" || role === "manager";
  document.getElementById("qaShareRow").style.display = canShare ? "flex" : "none";
}
function bindQuickAdd(){
  document.getElementById("qaKind").addEventListener("change", syncQuickAddBar);
  document.getElementById("qaProj").addEventListener("change", e=>{
    qaLastProjectId = e.target.value;
  });
  document.getElementById("qaText").addEventListener("keydown", e=>{
    if(e.key==="Enter"){ e.preventDefault(); doQuickAdd(); }
  });
  document.getElementById("qaAdd").addEventListener("click", doQuickAdd);
  document.getElementById("qaDate").value = todayISO();
}
async function doQuickAdd(){
  const proj = document.getElementById("qaProj");
  const kind = document.getElementById("qaKind").value;
  const title = document.getElementById("qaText").value;
  const date = document.getElementById("qaDate").value;
  const time = document.getElementById("qaTime").value;
  const needs = document.getElementById("qaNeeds").checked;
  const sub = document.getElementById("qaSub").checked;
  const url = document.getElementById("qaUrl").value;
  const role = sync.user && sync.user.role;
  const canShare = role === "admin" || role === "manager";
  const shareAll = canShare && document.getElementById("qaShareAll").checked;

  // Notes can't carry a per-item sharedWith (they're project-level text), so a
  // shared note is broadcast-appended to every user's same-named project.
  if(kind === "note" && shareAll){
    const projObj = state.projects.find(x => x.id === proj.value);
    const text = (title||"").trim();
    if(!projObj){ toast("Pick a project."); return; }
    if(!text){ toast("Type the note."); return; }
    const addBtn = document.getElementById("qaAdd");
    addBtn.disabled = true;
    try{
      await broadcastNote(projObj.name, text);
      const remote = await fetchRemote();
      if(remote && remote.data && Array.isArray(remote.data.projects)){
        state = migrate(remote.data);
        localStorage.setItem(STORE_KEY, JSON.stringify(state));
        sync.lastRemoteAt = remote.updatedAt;
      }
      document.getElementById("qaText").value = "";
      render();
      toast(`Note shared with everyone on ${projObj.name}.`);
    }catch(e){
      alert("Couldn't share note: " + (e.message || e));
    }finally{
      addBtn.disabled = false;
    }
    return;
  }

  const ok = quickAddStructured({
    projectId: proj.value,
    kind, title,
    date: kind==="schedule"?date:null,
    time: kind==="schedule"?(time||null):null,
    needs,
    subcontractor: kind==="schedule" ? sub : false,
    url: kind==="buy" ? (url.trim()||null) : null,
    shareAll: (kind !== "note") && shareAll,
  });
  if(ok){
    document.getElementById("qaText").value = "";
    document.getElementById("qaTime").value = "";
    document.getElementById("qaNeeds").checked = false;
    document.getElementById("qaSub").checked = false;
    document.getElementById("qaUrl").value = "";
  }
}

/* ---------- Wire up ---------- */
document.querySelectorAll("nav.tabs button").forEach(b=>{
  b.addEventListener("click",()=>{ openProjectId=null; view=b.dataset.view; render(); window.scrollTo(0,0); });
});
document.getElementById("punchBtn").addEventListener("click", showPunchlist);

bindQuickAdd();

window.addEventListener("storage", e=>{
  if(e.key===STORE_KEY){ state = load(); render(); }
});

let lastDay = todayISO();
setInterval(()=>{
  const now = todayISO();
  if(now!==lastDay){ lastDay=now; render(); }
  else archiveSweep();
}, 60000);

document.getElementById("syncBadge").addEventListener("click", async ()=>{
  if(!sync.user){
    const creds = await promptLogin({});
    if(!creds) return;
    saveAuth(creds);
    await initSync(); render(); return;
  }
  if(sync.viewAs){ exitViewAs(); return; }
  await pushRemoteNow();
});

render();

// Kick off cloud sync after initial paint so the app is usable immediately.
initSync();
</script>
