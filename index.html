<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#000000" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black" />
<meta name="apple-mobile-web-app-title" content="DOTY" />
<title>DOTY</title>
<link rel="icon" type="image/png" sizes="512x512" href="doty-logo-white-bg.png" />
<link rel="icon" type="image/png" sizes="192x192" href="doty-logo-white-bg.png" />
<link rel="shortcut icon" href="doty-logo-white-bg.png" />
<link rel="apple-touch-icon" href="doty-logo-white-bg.png" />
<link rel="apple-touch-icon" sizes="180x180" href="doty-logo-white-bg.png" />
<link rel="manifest" href='data:application/manifest+json,{"name":"DOTY","short_name":"DOTY","start_url":".","display":"standalone","background_color":"%23000000","theme_color":"%23000000","icons":[{"src":"doty-logo-white-bg.png","sizes":"512x512","type":"image/png","purpose":"any"},{"src":"doty-logo-white-bg.png","sizes":"192x192","type":"image/png","purpose":"any"}]}' />
<style>
  :root{
    --bg:#ffffff;
    --ink:#0a0a0a;
    --muted:#5b5b5b;
    --line:#dcdcdc;
    --line-strong:#222;
    --card:#fafafa;
    --accent:#ff6a00;
    --accent-ink:#ffffff;
    --warn-bg:#fff4c2;
    --warn-ink:#5a4500;
    --warn-line:#e6c64d;
    --done:#7a7a7a;
    --danger:#b00020;
    --safe:#0c7a3b;
    --tap:48px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Inter,Arial,sans-serif;
    font-size:16px;line-height:1.35;-webkit-text-size-adjust:100%;}
  /* Always reserve vertical-scrollbar space so switching to a tall view
     (e.g. Settings) doesn't shift the layout left when the scrollbar appears. */
  html{overflow-y:scroll;scrollbar-gutter:stable;}
  body{padding-bottom:calc(200px + env(safe-area-inset-bottom));}
  button{font:inherit;color:inherit}
  input,textarea,select{font:inherit;color:inherit}
  a{color:var(--ink)}

  header.appbar{
    position:sticky;top:0;z-index:50;
    background:#000;color:#fff;
    padding:8px 12px calc(8px + env(safe-area-inset-top));
    display:flex;align-items:center;gap:10px;
    border-bottom:2px solid var(--accent);
  }
  .brand{display:flex;align-items:center}
  .brand img{
    height:44px;width:auto;display:block;border-radius:8px;
  }
  .spacer{flex:1}
  .iconbtn{
    background:transparent;color:#fff;border:1px solid #444;border-radius:10px;
    min-width:var(--tap);min-height:var(--tap);padding:0 12px;font-weight:700;
    display:inline-flex;align-items:center;gap:6px;cursor:pointer;
  }
  .iconbtn:hover{background:#222}
  .iconbtn.primary{background:var(--accent);border-color:var(--accent);color:#111}
  .iconbtn.primary:hover{background:#e55f00}
  .iconbtn svg{width:18px;height:18px}

  .syncbadge{
    display:inline-flex;align-items:center;gap:6px;
    padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700;
    letter-spacing:.04em;text-transform:uppercase;
    background:#222;color:#fff;border:1px solid #444;
    cursor:pointer;min-height:28px;
  }
  .syncbadge .dot{
    width:8px;height:8px;border-radius:50%;background:#888;
    box-shadow:0 0 0 1px rgba(255,255,255,.15);
  }
  .syncbadge.ok .dot{background:#3ad28a}
  .syncbadge.syncing .dot{background:#ffb020;animation:pulse 1s infinite}
  .syncbadge.err .dot{background:#ff5a60}
  .syncbadge.off .dot{background:#888}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  .auth-back{
    position:fixed;inset:0;background:rgba(0,0,0,.78);
    z-index:100;display:grid;place-items:center;
    padding:20px;
  }
  .auth-card{
    background:#fff;border-radius:16px;padding:22px;
    width:min(420px,100%);box-shadow:0 12px 40px rgba(0,0,0,.45);
  }
  .auth-card h2{margin:0 0 6px;font-size:20px}
  .auth-card .sub{margin-bottom:14px}
  .auth-card input[type=password]{
    width:100%;padding:12px 14px;font-size:16px;
    border:1px solid var(--line);border-radius:10px;background:#fafafa;
    margin-bottom:10px;box-sizing:border-box;
  }
  .auth-card .err{color:var(--danger);font-size:13px;min-height:18px;margin-bottom:8px}
  .auth-card .row{display:flex;gap:8px;justify-content:flex-end}

  /* View-as (admin) read-only mode */
  .viewas-bar{
    display:none;
    position:sticky;top:0;z-index:60;
    background:#5a3500;color:#fff;
    padding:10px 14px;font-size:14px;font-weight:700;
    align-items:center;justify-content:space-between;gap:10px;
    border-bottom:2px solid var(--accent);
  }
  .viewas-bar .iconbtn{
    background:#fff;color:#111;border-color:#fff;min-height:34px;padding:0 12px;
  }
  body.viewas .quickbar{display:none}
  body.viewas .row-actions{display:none !important}
  body.viewas .check{pointer-events:none;opacity:.85}
  body.viewas .ghost,
  body.viewas button{pointer-events:none;opacity:.7}
  body.viewas .viewas-bar .iconbtn,
  body.viewas nav.tabs button,
  body.viewas .iconbtn#punchBtn,
  body.viewas .punchlist button,
  body.viewas #syncBadge{pointer-events:auto;opacity:1}

  /* Users panel (admin) */
  .users-table{width:100%;border-collapse:collapse;font-size:13px}
  .users-table th, .users-table td{
    padding:8px 6px;border-bottom:1px solid var(--line);text-align:left;vertical-align:middle;
  }
  .users-table th{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
  .users-table button{margin-left:4px}

  nav.tabs{
    position:sticky;top:0;z-index:40;
    display:grid;grid-template-columns:repeat(6,1fr);
    background:#fff;border-bottom:1px solid var(--line);
  }
  nav.tabs button{
    background:#fff;border:0;padding:14px 2px;font-weight:700;font-size:12px;
    border-bottom:3px solid transparent;color:#444;cursor:pointer;
    white-space:nowrap;
  }
  nav.tabs button.active{color:var(--ink);border-color:var(--accent)}

  main{padding:14px 14px 8px}
  .h1{font-size:22px;font-weight:800;margin:6px 0 10px}
  .h2{font-size:15px;font-weight:800;margin:18px 0 8px;letter-spacing:.02em;text-transform:uppercase;color:#222}
  .sub{color:var(--muted);font-size:13px}
  .help-btn{
    display:inline-flex;align-items:center;justify-content:center;
    width:24px;height:24px;border-radius:50%;border:1px solid var(--line);
    background:#fff;color:#444;font-weight:700;font-size:13px;line-height:1;
    margin-left:8px;cursor:pointer;vertical-align:middle;padding:0;
  }
  .help-btn:hover{background:#f5f5f5;border-color:var(--accent);color:var(--accent)}

  .empty-cta{
    border:1px dashed var(--line);border-radius:14px;
    padding:22px 18px;margin:18px 0;text-align:center;background:#fafafa;
  }
  .empty-cta .icon{font-size:32px;margin-bottom:6px}
  .empty-cta h3{margin:6px 0 6px;font-size:17px}
  .empty-cta p{margin:6px 0;color:var(--ink);font-size:14px;line-height:1.45}
  .empty-cta .hint{font-size:12px;color:var(--muted);margin-top:10px}
  .empty-cta b{color:var(--accent)}
  .empty-cta-banner{
    border:1px dashed var(--line);border-radius:10px;
    padding:10px 14px;margin:6px 0 12px;background:#fafafa;
    font-size:13px;color:var(--ink);
  }
  .empty-cta-banner b{color:var(--accent)}

  /* Phase 6 — subcontractor tag, to-buy link, calendar */
  .tag.sub{background:#e8d5ff;color:#5b21b6}
  .buy-link{
    display:inline-block;font-size:12px;color:var(--accent);
    margin:2px 0 0;text-decoration:none;
  }
  .buy-link:hover{text-decoration:underline}
  .cal-nav{display:flex;align-items:center;gap:8px;margin:8px 0 12px}
  .cal-nav .cal-month{flex:1;font-weight:800;font-size:16px;text-align:center}
  .cal-nav button{padding:6px 12px}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
  .cal-dow{
    text-align:center;font-size:11px;font-weight:700;color:var(--muted);
    text-transform:uppercase;padding:4px 0;
  }
  .cal-cell{
    min-height:54px;border:1px solid var(--line);border-radius:8px;
    padding:4px 2px;background:#fff;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:3px;
  }
  .cal-cell.cal-out{background:#fafafa;opacity:.45}
  .cal-cell.cal-today{border-color:var(--accent)}
  .cal-cell.cal-selected{background:var(--warn-bg);border-color:var(--accent);box-shadow:inset 0 0 0 2px var(--accent)}
  .cal-num{font-size:14px;font-weight:700;color:#222;line-height:1}
  .cal-cell.cal-today .cal-num{color:var(--accent)}
  .cal-dots{display:flex;flex-wrap:wrap;gap:2px;justify-content:center;max-width:46px}
  .cal-dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
  .cal-dot.done{background:#bbb}
  .cal-dot.sub{background:#8b5cf6}
  .cal-count{font-size:10px;font-weight:700;color:var(--muted);line-height:1}
  .cal-detail{margin-top:18px}
  .cal-detail-head{
    font-weight:800;font-size:15px;margin:0 0 8px;
    padding-bottom:4px;border-bottom:1px solid var(--line);
  }

  .datehead{
    margin:14px 0 6px;font-weight:800;font-size:15px;
    border-bottom:1px solid var(--line);padding-bottom:4px;
    display:flex;align-items:baseline;gap:8px;
  }
  .datehead .rel{font-weight:600;color:var(--muted);font-size:12px}

  .item{
    display:flex;align-items:flex-start;gap:10px;
    padding:12px 10px;border:1px solid var(--line);border-radius:12px;
    background:var(--card);margin:8px 0;
  }
  .item .check{
    flex:0 0 auto;width:28px;height:28px;border:2px solid var(--ink);border-radius:8px;
    display:grid;place-items:center;background:#fff;cursor:pointer;
  }
  .item .check[aria-checked="true"]{background:var(--ink);color:#fff}
  .item .check[aria-checked="true"]::after{content:"✓";font-weight:900}
  .item .body{flex:1;min-width:0}
  .item .title{font-weight:600;word-wrap:break-word;overflow-wrap:anywhere}
  .item .meta{font-size:12px;color:var(--muted);margin-top:4px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .item.done .title{text-decoration:line-through;color:var(--done)}
  .item .row-actions{display:flex;gap:4px;flex-wrap:wrap;margin-left:auto}
  .ghost{
    background:transparent;border:1px solid var(--line);border-radius:8px;
    padding:6px 10px;font-size:12px;min-height:32px;cursor:pointer;
  }
  .ghost:hover{background:#f3f3f3}
  .ghost.danger{color:var(--danger);border-color:#f1c1c8}
  .ghost.danger:hover{background:#fbe9ec}
  .ghost.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
  .ghost.primary:hover{background:#222}
  .tag{
    display:inline-flex;align-items:center;gap:4px;
    padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700;
    border:1px solid var(--line);background:#fff;color:#333;text-transform:uppercase;letter-spacing:.04em;
  }
  .tag.warn{background:var(--warn-bg);color:var(--warn-ink);border-color:var(--warn-line)}
  .tag.proj{background:#111;color:#fff;border-color:#111}
  .tag.kind{background:#eef0f2;color:#111;border-color:#dfe2e5}
  .tag.time{background:#fff;color:#111}
  .tag.shared{background:#eaf4ff;color:#0b5a9e;border-color:#bcdcf4;text-transform:none;letter-spacing:0}
  .item.shadow{background:#f7fbff}

  .projcard{
    border:1px solid var(--line);border-radius:14px;padding:14px;margin:10px 0;background:#fff;
    cursor:pointer;
  }
  .projcard:hover{border-color:#aaa}
  .projcard h3{margin:0 0 4px;font-size:18px}
  .projcard .meta{color:var(--muted);font-size:13px;margin-bottom:8px}
  .projcard .stats{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .projcard.deadline-soon{border-color:var(--accent)}

  .add-section{
    border:1px dashed var(--line);border-radius:12px;padding:10px;margin:8px 0 4px;
    display:flex;flex-direction:column;gap:8px;background:#fff;
  }
  .add-section .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .add-section input[type=text],
  .add-section input[type=date],
  .add-section input[type=time],
  .add-section input[type=number],
  .add-section textarea,
  .add-section select{
    flex:1;min-width:0;padding:12px;border:1px solid var(--line);border-radius:10px;background:#fff;
  }
  .add-section button{
    min-height:var(--tap);padding:0 14px;border-radius:10px;border:1px solid var(--ink);
    background:var(--ink);color:#fff;font-weight:700;cursor:pointer;
  }
  .add-section button:hover{background:#222}
  .add-section label.inline{display:flex;align-items:center;gap:6px;font-size:13px;color:#333}
  .add-section .hint{font-size:12px;color:var(--muted)}

  details.proj-section{
    border:1px solid var(--line);border-radius:12px;padding:0;margin:10px 0;background:#fff;overflow:hidden;
  }
  details.proj-section > summary{
    list-style:none;cursor:pointer;
    padding:14px;font-weight:800;display:flex;align-items:center;gap:8px;
  }
  details.proj-section > summary::-webkit-details-marker{display:none}
  details.proj-section > summary::after{content:"▾";margin-left:auto;color:#888;font-size:14px;transition:transform .15s}
  details.proj-section[open] > summary::after{transform:rotate(180deg)}
  details.proj-section .body{padding:0 14px 14px}

  /* Structured quick-add */
  .quickbar{
    position:fixed;left:0;right:0;bottom:0;z-index:60;
    background:#fff;border-top:1px solid var(--line);
    padding:8px 10px calc(10px + env(safe-area-inset-bottom));
    display:flex;flex-direction:column;gap:6px;
    box-shadow:0 -4px 16px rgba(0,0,0,.08);
  }
  .quickbar .inner{display:flex;flex-direction:column;gap:6px;width:100%}
  .quickbar .qa-row{display:flex;gap:6px;align-items:center;flex-wrap:nowrap}
  .quickbar select,
  .quickbar input[type=text],
  .quickbar input[type=date],
  .quickbar input[type=time]{
    flex:1;min-width:0;padding:10px 8px;border:1px solid var(--line);border-radius:10px;
    background:#fff;font-size:15px;min-height:42px;
  }
  .quickbar select{padding-right:24px;appearance:none;-webkit-appearance:none;background:#fff url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 8'%3E%3Cpath d='M1 1l5 5 5-5' stroke='%23333' stroke-width='1.5' fill='none' stroke-linecap='round'/%3E%3C/svg%3E") no-repeat right 8px center/12px 8px}
  .quickbar button.qa-add{
    min-height:42px;min-width:64px;padding:0 16px;border-radius:10px;
    border:1px solid var(--ink);background:var(--ink);color:#fff;font-weight:800;
    cursor:pointer;
  }
  .quickbar button.qa-add:hover{background:#222}
  .quickbar label.qa-needs{display:flex;align-items:center;gap:4px;font-size:12px;color:#333;padding:0 6px;white-space:nowrap}
  .quickbar .qa-compact{display:flex;gap:6px;align-items:center}
  .quickbar .qa-compact select{flex:0 1 auto;max-width:48%}

  /* Edit modal & generic modal */
  .modal-backdrop{
    position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:95;
    display:flex;align-items:center;justify-content:center;padding:16px;
  }
  .modal{
    background:#fff;border-radius:14px;width:100%;max-width:460px;max-height:90vh;overflow:auto;
    padding:16px;box-shadow:0 10px 40px rgba(0,0,0,.3);
  }
  .modal h3{margin:0 0 10px;font-size:18px}
  .modal .row{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
  .modal label{font-size:13px;font-weight:600;color:#333;display:block;margin-top:8px}
  .modal input[type=text],
  .modal input[type=date],
  .modal input[type=time],
  .modal input[type=number],
  .modal textarea,
  .modal select{
    width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;background:#fff;margin-top:4px;
  }
  .modal .actions{display:flex;gap:8px;margin-top:14px}
  .modal .actions button{flex:1;min-height:var(--tap);border-radius:10px;font-weight:700;cursor:pointer;border:1px solid var(--line);background:#fff}
  .modal .actions button.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
  .modal .actions button.danger{background:#fff;color:var(--danger);border-color:#f1c1c8}

  .punchlist{
    position:fixed;inset:0;z-index:90;background:#fff;display:flex;flex-direction:column;
  }
  .punchlist header{
    padding:14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;
    background:var(--ink);color:#fff;
  }
  .punchlist header .title{font-weight:800;font-size:18px}
  .punchlist .scroll{overflow:auto;padding:14px 16px 24px;font-size:17px;line-height:1.45}
  .punchlist h4{margin:18px 0 6px;font-size:15px;text-transform:uppercase;letter-spacing:.05em;color:#444}
  .punchlist ul{padding-left:22px;margin:6px 0 14px}
  .punchlist li{margin:6px 0}
  .punchlist .pill{font-size:11px;padding:2px 6px;border-radius:6px;background:#111;color:#fff;margin-right:6px;text-transform:uppercase;letter-spacing:.04em}
  .punchlist .needs{background:#f0c000;color:#111}
  .empty{color:var(--muted);font-style:italic;padding:18px 0;text-align:center}

  .toast{
    position:fixed;left:50%;bottom:220px;transform:translateX(-50%);
    background:#111;color:#fff;padding:10px 14px;border-radius:10px;font-size:14px;
    z-index:100;opacity:0;transition:opacity .15s;
    max-width:90vw;text-align:center;
    pointer-events:none;
  }
  .toast.show{opacity:1}

  textarea.notes{
    width:100%;min-height:120px;padding:10px;border:1px solid var(--line);
    border-radius:10px;background:#fff;resize:vertical;
  }

  .delete-proj{margin-top:14px;color:var(--danger);background:#fff;border:1px solid #f1c1c8;border-radius:10px;padding:10px;width:100%;cursor:pointer}
  .delete-proj:hover{background:#fbe9ec}

  /* Time tracker */
  .period-toggle{display:flex;gap:4px;background:#f3f3f3;border-radius:10px;padding:4px;margin:8px 0;width:fit-content}
  .period-toggle button{
    background:transparent;border:0;padding:8px 14px;border-radius:8px;font-weight:700;font-size:13px;
    color:#333;cursor:pointer;
  }
  .period-toggle button.active{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.1)}

  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:10px 0}
  .stat-card{border:1px solid var(--line);border-radius:12px;padding:12px;background:#fafafa}
  .stat-card .label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .stat-card .value{font-size:22px;font-weight:800;margin-top:4px}
  .stat-card .sub{font-size:12px;color:var(--muted)}

  .proj-hours{display:flex;flex-direction:column;gap:6px;margin:8px 0}
  .proj-hours .row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;gap:8px}
  .proj-hours .row .name{font-weight:700}
  .proj-hours .row .bar-wrap{flex:1;height:6px;background:#eee;border-radius:3px;overflow:hidden;min-width:40px}
  .proj-hours .row .bar{height:100%;background:var(--accent)}
  .proj-hours .row .h{font-weight:700;min-width:56px;text-align:right}

  .time-entry{
    display:flex;align-items:center;gap:8px;padding:10px 12px;
    border:1px solid var(--line);border-radius:10px;background:#fff;margin:6px 0;flex-wrap:wrap;
  }
  .time-entry .body{flex:1;min-width:160px}
  .time-entry .title{font-weight:600}
  .time-entry .meta{font-size:12px;color:var(--muted);margin-top:2px}
  .time-entry .hours{font-weight:800;font-size:16px;min-width:60px;text-align:right}

  @media (min-width:720px){
    main{max-width:820px;margin:0 auto}
    .quickbar{padding:10px 14px}
    .quickbar .inner{max-width:820px;margin:0 auto}
  }
</style>
</head>
<body>

<header class="appbar">
  <div class="brand">
    <img src="doty-logo-black-bg.png" alt="DOTY" />
  </div>
  <div class="spacer"></div>
  <button class="syncbadge off" id="syncBadge" title="Cloud sync status">
    <span class="dot"></span><span id="syncLabel">Offline</span>
  </button>
  <button class="iconbtn primary" id="punchBtn" title="Run punchlist">Punch</button>
</header>

<div class="viewas-bar" id="viewAsBanner"></div>

<nav class="tabs" id="tabs">
  <button data-view="today" class="active">Today</button>
  <button data-view="week">Week</button>
  <button data-view="calendar">Calendar</button>
  <button data-view="projects">Projects</button>
  <button data-view="time">Time</button>

<script>
"use strict";
/* ============================================================
   DOTY — single-file app
   Storage: localStorage key STORE_KEY
   ============================================================ */
const STORE_KEY = "doty.tracker.v1";
const AUTH_KEY  = "doty.tracker.auth";
const WORKER_URL = "https://doty-tracker-api.james-5aa.workers.dev";
const APP_VERSION = "6.0";
const APP_BUILD_DATE = "2026-05-14";
const ARCHIVE_AFTER_HOURS = 24;

/* ---------- Cloud sync (multi-user) ---------- */
const sync = {
  user: loadAuth(),            // { username, password, role } or null
  viewAs: null,                // username being viewed (admin only), or null
  stashedState: null,
  pushTimer: null,
  inflight: false,
  suspended: true,             // true until initial fetch completes
  lastRemoteAt: null,
};
function loadAuth(){
  try{ const r = localStorage.getItem(AUTH_KEY); return r ? JSON.parse(r) : null; }
  catch{ return null; }
}
function saveAuth(u){
  localStorage.setItem(AUTH_KEY, JSON.stringify(u));
  sync.user = u;
}
function clearAuth(){
  localStorage.removeItem(AUTH_KEY);
  sync.user = null;
}
function authHeader(){
  if(!sync.user) return "";
  return "Basic " + btoa(sync.user.username + ":" + sync.user.password);
}
function setSyncStatus(cls, label){
  const b = document.getElementById("syncBadge");
  const l = document.getElementById("syncLabel");
  if(!b || !l) return;
  b.classList.remove("ok","syncing","err","off");
  b.classList.add(cls);
  l.textContent = label;
  b.title = sync.user
    ? `Signed in as ${sync.user.username} (${sync.user.role})`
    : "Not signed in";
}
async function loginApi(username, password){
  const res = await fetch(WORKER_URL + "/auth", {
    method: "POST",
    headers: {
      "content-type":"application/json",
      "authorization":"Basic " + btoa(username + ":" + password),
    },
    body: "{}",
  });
  if(!res.ok) throw new Error("unauthorized");
  return await res.json(); // { ok, role, username, bootstrapped? }
}
async function changeMyPassword(oldPassword, newPassword){
  if(!sync.user) throw new Error("not signed in");
  const res = await fetch(WORKER_URL + "/auth/change-password", {
    method: "POST",
    headers: { "content-type":"application/json", "authorization": authHeader() },
    body: JSON.stringify({ oldPassword, newPassword }),
  });
  const j = await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(j.error || "change failed");
  return j;
}
function promptLogin({errorText=""}={}){
  return new Promise(resolve=>{
    const host = document.getElementById("modalHost");
    host.innerHTML = `
      <div class="auth-back" id="authBack">
        <form class="auth-card" id="authCard" autocomplete="off">
          <h2>Sign in to sync</h2>
          <div class="sub">Use the username and password your admin set up for you. (Lowercase username, 3-20 chars: a-z, 0-9, hyphen.)</div>
          <input type="text" id="authUser" autofocus autocomplete="username" placeholder="Username" autocapitalize="none" />
          <input type="password" id="authPw" autocomplete="current-password" placeholder="Password" />
          <div class="err" id="authErr">${escapeHtml(errorText)}</div>
          <div class="hint" style="font-size:.85em;color:var(--muted);margin-top:8px;">First time here? Ask your admin to create an account for you.</div>
          <div class="row">
            <button type="button" class="ghost" id="authOffline">Work offline</button>
            <button type="submit" class="ghost primary" id="authOk">Unlock</button>
          </div>
        </form>
      </div>`;
    const u = document.getElementById("authUser");
    const p = document.getElementById("authPw");
    const err = document.getElementById("authErr");
    u.focus();
    document.getElementById("authOffline").addEventListener("click", ()=>{
      host.innerHTML = ""; resolve(null);
    });
    document.getElementById("authCard").addEventListener("submit", async e=>{
      e.preventDefault();
      const un = u.value.trim().toLowerCase();
      const pw = p.value;
      if(!un || !pw){ err.textContent = "Enter a username and password."; return; }
      err.textContent = "Checking...";
      try{
        const r = await loginApi(un, pw);
        host.innerHTML = "";
        resolve({ username: un, password: pw, role: r.role });
      }catch{
        err.textContent = "Wrong credentials or network error.";
        p.select();
      }
    });
  });
}
async function fetchRemote(asUsername){
  if(!sync.user) return null;
  const url = WORKER_URL + "/data" + (asUsername ? `?as=${encodeURIComponent(asUsername)}` : "");
  const res = await fetch(url, { headers: { "authorization": authHeader() }});
  if(res.status === 401) throw new Error("unauthorized");
  if(!res.ok) throw new Error("fetch failed: "+res.status);
  return await res.json();
}
async function pushRemoteNow(){
  if(!sync.user || sync.suspended || sync.viewAs) return;
  if(sync.inflight){ schedulePush(400); return; }
  sync.inflight = true;
  setSyncStatus("syncing","Syncing");
  try{
    const res = await fetch(WORKER_URL + "/data", {
      method: "PUT",
      headers: { "content-type":"application/json", "authorization": authHeader() },
      // Send prevUpdatedAt so the worker can reject blind overwrites.
      // If the stored updatedAt differs, server returns 409 and we refresh
      // from remote instead of clobbering concurrent web-session writes.
      body: JSON.stringify({ data: state, prevUpdatedAt: sync.lastRemoteAt }),
    });
    if(res.status === 401){
      setSyncStatus("err","Signed out");
      clearAuth();
      return;
    }
    if(res.status === 409){
      // Server has newer data than we expected. Stash a deep copy of the
      // pre-conflict local state so the user can opt to restore it, then
      // refetch + replace local state so we don't clobber concurrent writes.
      console.warn("push conflict (409) — refreshing from server");
      const stashed = JSON.parse(JSON.stringify(state));
      try{
        const remote = await fetchRemote();
        if(remote && remote.data && typeof remote.data === "object" && Array.isArray(remote.data.projects)){
          state = migrate(remote.data);
          localStorage.setItem(STORE_KEY, JSON.stringify(state));
          sync.lastRemoteAt = remote.updatedAt;
          render();
          setSyncStatus("ok","Refreshed");
          toastWithAction(
            "Server had newer data — refreshed.",
            "Restore my version",
            async ()=>{
              // Replace local state with the pre-conflict snapshot, then push.
              // sync.lastRemoteAt is now the freshly-fetched server version, so
              // the push will pass CAS and overwrite what's there.
              state = migrate(stashed);
              localStorage.setItem(STORE_KEY, JSON.stringify(state));
              render();
              await pushRemoteNow();
              toast("Your version restored.");
            }
          );
        } else {
          setSyncStatus("err","Conflict");
        }
      }catch(err){
        console.warn("conflict refresh failed", err);
        setSyncStatus("err","Conflict");
      }
      return;
    }
    if(!res.ok) throw new Error("push failed: "+res.status);
    const j = await res.json();
    sync.lastRemoteAt = j.updatedAt;
    setSyncStatus("ok","Synced");
  }catch(e){
    console.warn("push error",e);
    setSyncStatus("err","Offline");
  }finally{
    sync.inflight = false;
  }
}
function schedulePush(ms=800){
  clearTimeout(sync.pushTimer);
  sync.pushTimer = setTimeout(pushRemoteNow, ms);
}
async function initSync(){
  if(!sync.user){
    setSyncStatus("off","Locked");
    const creds = await promptLogin({});
    if(!creds){ setSyncStatus("off","Offline"); sync.suspended = true; return; }
    saveAuth(creds);
  }
  setSyncStatus("syncing","Syncing");
  try{
    const remote = await fetchRemote();
    if(remote && remote.data && typeof remote.data === "object" && Array.isArray(remote.data.projects)){
      state = migrate(remote.data);
      localStorage.setItem(STORE_KEY, JSON.stringify(state));
      sync.lastRemoteAt = remote.updatedAt;
      sync.suspended = false;
      setSyncStatus("ok","Synced");
      render();
    } else {
      sync.suspended = false;
      await pushRemoteNow();
    }
  }catch(e){
    if(String(e.message).includes("unauthorized")){
      clearAuth();
      setSyncStatus("err","Signed out");
      const creds = await promptLogin({errorText:"Session expired. Sign in again."});
      if(creds){ saveAuth(creds); return initSync(); }
      sync.suspended = true; setSyncStatus("off","Offline"); return;
    }
    console.warn("fetchRemote failed",e);
    setSyncStatus("err","Offline");
    sync.suspended = false;
  }
}

/* ---------- Date helpers ---------- */
const DAY_MS = 86400000;
function todayISO(d=new Date()){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0"), day=String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function parseISO(s){ const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); }
function fmtLong(iso){
  const d=parseISO(iso);
  return d.toLocaleDateString(undefined,{weekday:"long",month:"short",day:"numeric"});
}
function fmtShort(iso){
  const d=parseISO(iso);
  return d.toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"});
}
function fmtMonth(iso){
  const d=parseISO(iso);
  return d.toLocaleDateString(undefined,{month:"long",year:"numeric"});
}
function relLabel(iso){
  const t=todayISO(); const tomorrow=todayISO(new Date(Date.now()+DAY_MS));
  if(iso===t) return "Today";
  if(iso===tomorrow) return "Tomorrow";
  const diff=Math.round((parseISO(iso)-parseISO(t))/DAY_MS);
  if(diff>1 && diff<=7) return `In ${diff} days`;
  if(diff<0 && diff>=-7) return `${-diff} day${diff===-1?"":"s"} ago`;
  return "";
}
function fmtTime12(t){
  if(!t) return "";
  const [hh,mm]=t.split(":").map(Number);
  const h12=((hh+11)%12)+1; const ap=hh<12?"am":"pm";
  return mm? `${h12}:${String(mm).padStart(2,"0")}${ap}` : `${h12}${ap}`;
}
function startOfWeek(d=new Date()){
  const x=new Date(d); x.setHours(0,0,0,0);
  const dow=x.getDay();
  const diff = (dow===0?-6:1-dow);
  x.setDate(x.getDate()+diff);
  return x;
}
function startOfMonth(d=new Date()){
  const x=new Date(d); x.setHours(0,0,0,0);
  x.setDate(1);
  return x;
}
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }

/* ---------- ID ---------- */
function uid(){ return Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4); }

/* ---------- Storage / seed / migration ---------- */
function load(){
  try{
    const raw=localStorage.getItem(STORE_KEY);
    if(!raw) return seed();
    const parsed=JSON.parse(raw);
    if(!parsed.projects) return seed();
    return migrate(parsed);
  }catch(e){ console.warn("load failed, seeding",e); return seed(); }
}
function migrate(s){
  if(!Array.isArray(s.timeEntries)) s.timeEntries = [];
  if(typeof s.settings !== "object" || !s.settings) s.settings = {};
  if(!Array.isArray(s.dismissedShared)) s.dismissedShared = [];
  // Ensure soft-archive arrays exist on every project, and filter out any
  // shadow items the user has dismissed.
  if(Array.isArray(s.projects)){
    const dismissed = new Set(s.dismissedShared);
    for(const p of s.projects){
      if(!p) continue;
      if(!Array.isArray(p.archivedSchedule)) p.archivedSchedule = [];
      if(!Array.isArray(p.archivedTodos))    p.archivedTodos = [];
      if(!Array.isArray(p.archivedToBuy))    p.archivedToBuy = [];
      for(const k of ["schedule","todos","toBuy"]){
        if(Array.isArray(p[k])){
          p[k] = p[k].filter(it => !(it && it.sharedFrom && dismissed.has(it.id)));
        }
      }
    }
  }
  // Normalize legacy time entries (old shape: {project:<name>, start, end, note}).
  // Modern shape: {id, projectId, date, hours, note, createdAt}.
  const projects = Array.isArray(s.projects) ? s.projects : [];
  s.timeEntries = s.timeEntries.map(e => {
    if(!e || typeof e !== "object") return e;
    if(e.projectId && e.date && e.hours != null) return e; // already modern
    const out = { ...e };
    if(!out.id) out.id = uid();
    // Resolve projectId from project name if needed
    if(!out.projectId && typeof out.project === "string"){
      const match = projects.find(p => (p.name||"").toLowerCase() === out.project.toLowerCase());
      out.projectId = match ? match.id : null;
    }
    // Derive date + hours from start/end timestamps
    if((out.date == null || out.hours == null) && out.start && out.end){
      const ms0 = Date.parse(out.start), ms1 = Date.parse(out.end);
      if(ms0 && ms1 && ms1 > ms0){
        if(out.date == null) out.date = new Date(ms0).toISOString().slice(0,10);
        if(out.hours == null) out.hours = +((ms1 - ms0) / 3600000).toFixed(2);
        if(out.createdAt == null) out.createdAt = ms0;
      }
    }
    delete out.start; delete out.end; delete out.project;
    return out;
  }).filter(e => e && e.date && e.hours != null);
  return s;
}
function save(){
  if(sync.viewAs) return; // read-only while viewing another user
  localStorage.setItem(STORE_KEY, JSON.stringify(state));
  if(sync.user && !sync.suspended) schedulePush();
}

function seed(){

/* ---------- Auto-archive (soft) ---------- */
function archiveSweep(){
  const cutoff = Date.now() - ARCHIVE_AFTER_HOURS*3600*1000;
  let changed=false;
  const isShadow = (x) => x && typeof x.id === "string" && x.id.startsWith("shared:") && x.sharedFrom;
  const sweepKind = (live, arch) => {
    const keep = []; const move = [];
    for(const x of live){
      const eligible = x.completed && x.completedAt && x.completedAt < cutoff;
      // Shadow items can't be archived locally — they're regenerated from the
      // owner's data on every sync. Just leave them visible.
      if(eligible && !isShadow(x)){
        x._archivedAt = Date.now();
        move.push(x);
      } else {
        keep.push(x);
      }
    }
    if(move.length) arch.push(...move);
    return [keep, move.length > 0];
  };
  for(const p of state.projects){
    if(!Array.isArray(p.archivedSchedule)) p.archivedSchedule = [];
    if(!Array.isArray(p.archivedTodos))    p.archivedTodos = [];
    if(!Array.isArray(p.archivedToBuy))    p.archivedToBuy = [];
    let any = false, r;
    r = sweepKind(p.schedule, p.archivedSchedule); p.schedule = r[0]; if(r[1]) any = true;
    r = sweepKind(p.todos,    p.archivedTodos);    p.todos    = r[0]; if(r[1]) any = true;
    r = sweepKind(p.toBuy,    p.archivedToBuy);    p.toBuy    = r[0]; if(r[1]) any = true;
    if(any) changed = true;
  }
  if(changed) save();
}

/* ---------- Structured quick-add ---------- */
function normalizeUrl(u){
  u = String(u||"").trim();
  if(!u) return "";
  if(!/^https?:\/\//i.test(u)) u = "https://" + u;
  return u;
}
function safeUrl(u){
  u = String(u||"").trim();
  return /^https?:\/\/[^\s]+$/i.test(u) ? u : null;
}
function quickAddStructured({projectId, kind, title, date, time, needs, subcontractor, url, shareAll}){
  const p = state.projects.find(x => x.id === projectId);
  if(!p){ toast("Pick a project."); return false; }
  title = (title||"").trim();
  if(!title){ toast("Type what you want to add."); return false; }
  const shareSuffix = shareAll ? " · shared with everyone" : "";
  if(kind === "schedule"){
    if(!date){ toast("Pick a date for schedule items."); return false; }
    const item = sItem(title, date, time||null, !!needs);
    if(subcontractor) item.subcontractor = true;
    if(shareAll) item.sharedWith = ["*"];
    p.schedule.push(item);
    toast(`Added to ${p.name} on ${fmtShort(date)}${time?" "+fmtTime12(time):""}${shareSuffix}`);
  } else if(kind === "todo"){
    const item = tItem(title, !!needs);
    if(shareAll) item.sharedWith = ["*"];
    p.todos.push(item);
    toast(`Added to ${p.name} to-do${shareSuffix}`);
  } else if(kind === "buy"){
    const item = { id:uid(), title, qty:null, completed:false, needsConfirmation:!!needs };
    const nu = normalizeUrl(url);
    if(nu) item.url = nu;
    if(shareAll) item.sharedWith = ["*"];
    p.toBuy.push(item);
    toast(`Added to ${p.name} to-buy${shareSuffix}`);
  } else if(kind === "note"){
    p.notes = (p.notes ? p.notes + "\n" : "") + title;
    const preview = title.length > 40 ? title.slice(0, 40) + "…" : title;
    toast(`Note appended to ${p.name}: "${preview}"`);
  }
  qaLastProjectId = p.id;
  save(); render();
  return true;
}

/* ---------- Toast ---------- */
let toastTimer=null;
function toast(msg){
  const el=document.getElementById("toast");
  el.textContent=msg; el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove("show"),2400);
}
// Like toast() but with an action button. Stays up for `ttl` ms (default 10s).
function toastWithAction(msg, actionLabel, onAction, ttl=10000){
  const el = document.getElementById("toast");
  clearTimeout(toastTimer);
  el.innerHTML = `<span style="margin-right:12px">${escapeHtml(msg)}</span>` +
    `<button id="__toastAction" style="background:#fff;color:#000;border:0;padding:6px 12px;border-radius:6px;font-weight:700;cursor:pointer">${escapeHtml(actionLabel)}</button>`;
  el.classList.add("show");
  const dismiss = ()=>{ el.classList.remove("show"); el.innerHTML = ""; };
  document.getElementById("__toastAction").addEventListener("click", ()=>{
    dismiss();
    try{ onAction(); }catch(e){ console.warn("toast action failed", e); }
  });
  toastTimer = setTimeout(dismiss, ttl);
}

function renderWeek(){
  const today = new Date(); today.setHours(0,0,0,0);
  const days = [];
  for(let i=0;i<7;i++){
    const d=new Date(today.getTime()+i*DAY_MS);
    days.push(todayISO(d));
  }
  let html = `<div class="h1">Next 7 days ${helpButton("week")}</div>`;
  let any=false;
  for(const iso of days){
    const items = collectScheduleByDate([iso]);
    if(!items.length) continue;
    any=true;
    html += `<div class="datehead">${fmtLong(iso)} <span class="rel">${relLabel(iso)||""}</span></div>`;
    html += renderItems(items, {showProject:true});
  }
  if(!any) html += `<div class="empty">No scheduled items in the next 7 days.</div>`;
  app.innerHTML = html;
  bindItemEvents();
}

function renderCalendar(){
  const anchor = parseISO(calendarAnchorISO);
  const year = anchor.getFullYear();
  const month = anchor.getMonth();
  const monthStart = new Date(year, month, 1);
  const monthLabel = monthStart.toLocaleDateString("en-US", { month: "long", year: "numeric" });
  const today = todayISO();
  // Map ISO date -> full schedule item objects (with project ref) so the
  // detail panel can render them as interactive items.
  const byDate = {};
  for(const p of state.projects){
    for(const it of (p.schedule || [])){
      if(!it.date) continue;
      (byDate[it.date] = byDate[it.date] || []).push({ ...it, _kind:"schedule", _projId:p.id });
    }
  }
  const firstDow = monthStart.getDay();              // 0=Sun
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const lastDow = new Date(year, month, daysInMonth).getDay();
  const gridStart = new Date(year, month, 1 - firstDow);
  const totalCells = firstDow + daysInMonth + (6 - lastDow);

  let html = `<div class="h1">Calendar ${helpButton("calendar")}</div>`;
  html += `<div class="cal-nav">
    <button class="ghost" id="calPrev" aria-label="Previous month">‹</button>
    <div class="cal-month">${escapeHtml(monthLabel)}</div>
    <button class="ghost" id="calNext" aria-label="Next month">›</button>
    <button class="ghost" id="calToday">Today</button>
  </div>`;
  html += `<div class="cal-grid">`;
  for(const d of ["Su","Mo","Tu","We","Th","Fr","Sa"]){
    html += `<div class="cal-dow">${d}</div>`;
  }
  for(let i = 0; i < totalCells; i++){
    const cellDate = new Date(gridStart);
    cellDate.setDate(gridStart.getDate() + i);
    const iso = todayISO(cellDate);
    const inMonth = cellDate.getMonth() === month;
    const items = byDate[iso] || [];
    let cls = "cal-cell";
    if(!inMonth) cls += " cal-out";
    if(iso === today) cls += " cal-today";
    if(iso === calendarSelectedISO) cls += " cal-selected";
    let cell = `<div class="${cls}" data-cal-day="${iso}">`;
    cell += `<div class="cal-num">${cellDate.getDate()}</div>`;
    if(items.length){
      const dots = items.slice(0, 4).map(it=>{
        const dc = it.completed ? "done" : it.subcontractor ? "sub" : "";
        return `<span class="cal-dot ${dc}"></span>`;
      }).join("");
      cell += `<div class="cal-dots">${dots}</div>`;
      if(items.length > 4) cell += `<div class="cal-count">${items.length} items</div>`;
    }
    cell += `</div>`;
    html += cell;
  }
  html += `</div>`;

  // Detail panel: the selected day's items, fully interactive.
  if(calendarSelectedISO){
    const dayItems = (byDate[calendarSelectedISO] || []).slice().sort((a,b)=>{
      if(a.time && b.time) return a.time.localeCompare(b.time);
      if(a.time) return -1; if(b.time) return 1; return 0;
    });
    html += `<div class="cal-detail">
      <div class="cal-detail-head">${escapeHtml(fmtLong(calendarSelectedISO))}</div>`;
    html += dayItems.length
      ? renderItems(dayItems, { showProject:true })
      : `<div class="empty">Nothing scheduled this day.</div>`;
    html += `</div>`;
  } else {
    html += `<div class="cal-detail"><div class="hint" style="text-align:center;margin-top:14px">Tap a day to see what's scheduled.</div></div>`;
  }

  app.innerHTML = html;
  document.getElementById("calPrev").addEventListener("click", ()=>{
    const a = parseISO(calendarAnchorISO); a.setDate(1); a.setMonth(a.getMonth()-1);
    calendarAnchorISO = todayISO(a); renderCalendar();
  });
  document.getElementById("calNext").addEventListener("click", ()=>{
    const a = parseISO(calendarAnchorISO); a.setDate(1); a.setMonth(a.getMonth()+1);
    calendarAnchorISO = todayISO(a); renderCalendar();
  });
  document.getElementById("calToday").addEventListener("click", ()=>{
    calendarAnchorISO = todayISO(); calendarSelectedISO = todayISO(); renderCalendar();
  });
  app.querySelectorAll("[data-cal-day]").forEach(cell=>{
    cell.addEventListener("click", ()=>{
      const iso = cell.dataset.calDay;
      calendarSelectedISO = iso;
      // Tapping a day outside the displayed month jumps the grid there too.
      const d = parseISO(iso);
      if(d.getMonth() !== month || d.getFullYear() !== year) calendarAnchorISO = iso;
      renderCalendar();
    });
  });
  bindItemEvents();
}

  const role = sync.user && sync.user.role;

  let html = `<div class="h1">Projects ${helpButton("projects")}</div>`;
  html += `<div class="add-section">

  const projectsList = state.projects || [];
  const allEmpty = projectsList.length > 0 && projectsList.every(p =>
    (!p.schedule || p.schedule.length === 0) &&
    (!p.todos    || p.todos.length === 0) &&
    (!p.toBuy    || p.toBuy.length === 0) &&
    (!p.notes    || !String(p.notes).trim())
  );
  if(projectsList.length === 0){
    html += `<div class="empty-cta">
      <div class="icon">📁</div>
      <h3>No projects yet.</h3>
      <p>Type a name (and optional deadline) above and hit <b>Add project</b> to create your first one.</p>
    </div>`;
  } else if(allEmpty){
    html += `<div class="empty-cta-banner">
      Your projects are set up — now add items to them. Use the <b>bar at the bottom of the screen</b>: pick a project + type, then type and tap Add. Or tap a project card to open its full page.
    </div>`;
  }
  for(const p of projectsList){
    const counts = projectCounts(p);
    const dlClass = isDeadlineSoon(p.deadline) ? " deadline-soon":"";
    html += `<div class="projcard${dlClass}" data-open="${p.id}">
      <h3>${escapeHtml(p.name)}</h3>
      <div class="meta">
        ${p.deadline?`Deadline: <strong>${fmtLong(p.deadline)}</strong> · ${daysUntil(p.deadline)}`:`No deadline`}
      </div>
      <div class="stats">
        <span class="tag">${counts.today} today</span>
        <span class="tag">${counts.upcoming} upcoming</span>
        <span class="tag">${counts.todos} to-do</span>
        <span class="tag">${counts.toBuy} to-buy</span>
        ${counts.needs? `<span class="tag warn">${counts.needs} needs confirm</span>`:``}
      </div>
    </div>`;
  }
  app.innerHTML = html;
  app.querySelectorAll(".projcard[data-open]").forEach(card=>{
    card.addEventListener("click", ()=>{ openProjectId = card.dataset.open; render(); window.scrollTo(0,0); });
  });
  document.getElementById("newProjBtn").addEventListener("click", async ()=>{
    const name = document.getElementById("newProjName").value.trim();
    const dl = document.getElementById("newProjDeadline").value || null;
    if(!name){ toast("Project name required."); return; }
    const broadcastCb = document.getElementById("newProjBroadcast");
    const broadcast = !!(broadcastCb && broadcastCb.checked);
    if(broadcast){
      // Admin path: fan out to every user via the worker, then refetch to merge.
      const btn = document.getElementById("newProjBtn");
      btn.disabled = true;
      try{
        await pushRemoteNow();           // flush any pending local edits first
        const r = await broadcastProject(name, dl);
        const remote = await fetchRemote();
        if(remote && remote.data && Array.isArray(remote.data.projects)){
          state = migrate(remote.data);
          localStorage.setItem(STORE_KEY, JSON.stringify(state));
          sync.lastRemoteAt = remote.updatedAt;
        }
        document.getElementById("newProjName").value = "";
        document.getElementById("newProjDeadline").value = "";
        if(broadcastCb) broadcastCb.checked = false;
        render();
        const n = (r.addedTo||[]).length;
        const skipped = (r.skipped||[]).length;
        toast(`Created on ${n} user${n===1?"":"s"}${skipped?` (${skipped} already had it)`:""}.`);
      }catch(e){
        alert("Couldn't broadcast project: " + (e.message || e));
      }finally{
        btn.disabled = false;
      }
      return;
    }
    state.projects.push({ id:uid(), name, deadline:dl, notes:"", schedule:[], todos:[], toBuy:[] });
    save(); render();
  });
}

  html += `<div class="sub">${p.deadline?`Deadline: <strong>${fmtLong(p.deadline)}</strong> · ${daysUntil(p.deadline)}`:`No deadline set`}</div>`;

  html += `<details class="proj-section" open><summary>Schedule (${sched.filter(x=>!x.completed).length})</summary><div class="body">`;
  html += renderProjectSchedule(p, sched);
  html += `</div></details>`;

  html += `<details class="proj-section" open><summary>To-do (${todos.filter(x=>!x.completed).length})</summary><div class="body">`;

  html += `</div></details>`;

  html += `<details class="proj-section" open><summary>To-buy (${buys.filter(x=>!x.completed).length})</summary><div class="body">`;
  html += buys.length ? renderBuyList(p, buys) : `<div class="empty">Nothing on the buy list.</div>`;
  html += `</div></details>`;

  html += `<details class="proj-section"><summary>Notes</summary><div class="body">
    <textarea class="notes" id="projNotes" placeholder="Notes...">${escapeHtml(p.notes||"")}</textarea>
    <div class="hint" style="font-size:12px;color:var(--muted);margin-top:6px">Saves automatically.</div>
  </div></details>`;

  html += renderArchivedSection(p);

  if(p.sharedVirtual){
    html += `<details class="proj-section"><summary>Project settings</summary><div class="body">
      <div class="hint">This project is a shared view from another user. You can't rename or delete it from here — it'll come back on next sync. Use the "Hide" button on individual shared items to remove them from your view.</div>
    </div></details>`;
  } else {
    html += `<details class="proj-section"><summary>Project settings</summary><div class="body">
      <div class="add-section">
        <label class="inline">Name <input type="text" id="renameProj" value="${escapeHtml(p.name)}" /></label>
        <label class="inline">Deadline <input type="date" id="changeDeadline" value="${p.deadline||""}" /></label>
        <div class="row"><button id="saveProjMeta">Save</button></div>
      </div>
      <button class="delete-proj" id="deleteProjBtn">Delete project</button>
    </div></details>`;
  }

  app.innerHTML = html;

  document.getElementById("backBtn").addEventListener("click",()=>{ openProjectId=null; view="projects"; render(); window.scrollTo(0,0); });
  document.getElementById("projNotes").addEventListener("input", e=>{ p.notes=e.target.value; save(); });

  if(!p.sharedVirtual){
    document.getElementById("saveProjMeta").addEventListener("click",()=>{
      const newName = document.getElementById("renameProj").value.trim();
      const newDl = document.getElementById("changeDeadline").value || null;
      if(newName) p.name = newName;
      p.deadline = newDl;
      save(); render();
    });
    document.getElementById("deleteProjBtn").addEventListener("click",()=>{
      if(!confirm(`Delete project "${p.name}"? This cannot be undone.`)) return;
      state.projects = state.projects.filter(x=>x.id!==p.id);
      openProjectId=null; view="projects"; save(); render();
    });
  }

  // Archive section actions: Restore (back to live list) + permanent Delete.
  app.querySelectorAll('.archived-item [data-archact]').forEach(btn => {
    btn.addEventListener("click", () => {
      const node = btn.closest(".archived-item");
      const kind = node.dataset.akind;
      const id   = node.dataset.aid;
      const archKey = kind === "schedule" ? "archivedSchedule" : kind === "todo" ? "archivedTodos" : "archivedToBuy";
      const liveKey = kind === "schedule" ? "schedule"        : kind === "todo" ? "todos"        : "toBuy";
      const arr = p[archKey] || [];
      const idx = arr.findIndex(x => x.id === id);
      if(idx < 0) return;
      if(btn.dataset.archact === "restore"){
        const [restored] = arr.splice(idx, 1);
        restored.completed = false;
        restored.completedAt = null;
        delete restored._archivedAt;
        p[liveKey] = p[liveKey] || [];
        p[liveKey].push(restored);
        save(); render();
        toast(`Restored "${restored.title || "(item)"}".`);
      } else if(btn.dataset.archact === "purge"){
        const removed = arr[idx];
        if(!confirm(`Permanently delete "${removed.title || "this item"}"? Cannot be undone.`)) return;
        arr.splice(idx, 1);
        save(); render();
        toast("Deleted.");
      }
    });
  });

  bindItemEvents();
}

function renderArchivedSection(p){
  const sections = [
    { key: "archivedSchedule", label: "Schedule", kind: "schedule" },
    { key: "archivedTodos",    label: "To-do",    kind: "todo" },
    { key: "archivedToBuy",    label: "To-buy",   kind: "buy" },
  ];
  let inner = ""; let total = 0;
  for(const s of sections){
    const arr = p[s.key] || [];
    if(!arr.length) continue;
    total += arr.length;
    inner += `<div style="font-weight:700;font-size:13px;margin:12px 0 4px;color:#444">${s.label} (${arr.length})</div>`;
    for(const it of [...arr].reverse()){
      const ts = it._archivedAt ? new Date(it._archivedAt).toLocaleDateString() : "";
      inner += `<div class="archived-item" data-akind="${s.kind}" data-aid="${escapeHtml(it.id||"")}" style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--line);font-size:14px">
        <span style="flex:1;color:#888;text-decoration:line-through">${escapeHtml(it.title || "(untitled)")}</span>
        <span style="font-size:11px;color:var(--muted);white-space:nowrap">${escapeHtml(ts)}</span>
        <button class="ghost" data-archact="restore" style="padding:4px 8px;font-size:12px">Restore</button>
        <button class="ghost danger" data-archact="purge" style="padding:4px 8px;font-size:12px">Delete</button>
      </div>`;
    }
  }
  if(!total) return "";
  return `<details class="proj-section"><summary>Archived (${total})</summary><div class="body">${inner}</div></details>`;
}

/* ---------- Sub-render helpers ---------- */
function renderProjectSchedule(p, sched){
  if(!sched.length) return `<div class="empty">No scheduled items.</div>`;
  const groups = {};
  for(const it of sched){ (groups[it.date] = groups[it.date]||[]).push(it); }
  const dates = Object.keys(groups).sort();
  let out = "";
  for(const d of dates){
    out += `<div class="datehead">${fmtLong(d)} <span class="rel">${relLabel(d)||""}</span></div>`;
    out += renderItems(groups[d].map(i=>({...i, _kind:"schedule", _projId:p.id})), {});
  }
  return out;
}
function renderBuyList(p, buys){
  return renderItems(buys.map(b=>({...b, _kind:"buy", _projId:p.id, _displayTitle: (b.qty?`${b.qty}× `:"")+b.title})), {flat:true});
}

function renderItems(items, opts={}){
  if(!items.length) return `<div class="empty">Nothing here.</div>`;
  const sorted = [...items].sort((a,b)=>{
    if(!!a.completed!==!!b.completed) return a.completed?1:-1;
    if(a.time && b.time) return a.time.localeCompare(b.time);
    if(a.time) return -1; if(b.time) return 1;
    return 0;
  });
  return sorted.map(it=>{
    const projObj = it._projId ? state.projects.find(p=>p.id===it._projId) : findProjectOf(it);
    const projName = projObj?projObj.name:"";
    const kind = it._kind || guessKind(it);
    const projId = it._projId || (projObj?projObj.id:"");
    const tags = [];
    if(opts.showProject && projName) tags.push(`<span class="tag proj">${escapeHtml(projName)}</span>`);
    if(it.time) tags.push(`<span class="tag time">${fmtTime12(it.time)}</span>`);
    if(opts.showDate && it.date) tags.push(`<span class="tag">${fmtShort(it.date)}</span>`);
    if(it.needsConfirmation) tags.push(`<span class="tag warn">Needs confirmation</span>`);
    if(it.subcontractor) tags.push(`<span class="tag sub">Subcontractor</span>`);
    if(kind==="todo" && !opts.showProject) tags.push(`<span class="tag kind">To-do</span>`);
    if(kind==="buy"  && !opts.showProject) tags.push(`<span class="tag kind">To-buy</span>`);
    const isShadow = !!it.sharedFrom;
    const isSharedByMe = !isShadow && Array.isArray(it.sharedWith) && it.sharedWith.length > 0;
    if(isShadow) tags.push(`<span class="tag shared">From ${escapeHtml(it.sharedFrom)}</span>`);
    if(isSharedByMe) tags.push(`<span class="tag shared">Shared with ${escapeHtml(it.sharedWith.join(", "))}</span>`);
    const canShare = !isShadow;  // schedule / todo / to-buy can all be manually shared
    const myRole = sync.user && sync.user.role;
    const canEditShared = isShadow && (myRole === "admin" || myRole === "manager");
    const displayTitle = it._displayTitle || it.title;
    return `<div class="item ${it.completed?"done":""} ${isShadow?"shadow":""}" data-id="${it.id}" data-kind="${kind}" data-proj="${projId}">
      <div class="check" role="checkbox" aria-checked="${it.completed?"true":"false"}" tabindex="0" data-act="toggle"></div>
      <div class="body">
        <div class="title">${escapeHtml(displayTitle)}</div>
        ${(kind==="buy" && safeUrl(it.url)) ? `<a class="buy-link" href="${escapeHtml(safeUrl(it.url))}" target="_blank" rel="noopener noreferrer">🔗 Open product link</a>` : ""}
        <div class="meta">
          ${tags.join(" ")}
          <span class="row-actions">
            ${isShadow
              ? `${canEditShared ? `<button class="ghost" data-act="edit">Edit</button>` : ""}<button class="ghost" data-act="hide" title="Hide this shared item from your view">Hide</button>`
              : `<button class="ghost" data-act="edit">Edit</button>`}
            ${isShadow ? "" : (it.needsConfirmation
              ? `<button class="ghost" data-act="confirm">Confirm</button>`
              : `<button class="ghost" data-act="needs">Needs confirm</button>`)}
            ${canShare ? `<button class="ghost" data-act="share">${isSharedByMe?"Sharing…":"Share"}</button>` : ""}
            ${isShadow ? "" : `<button class="ghost danger" data-act="delete">Delete</button>`}
          </span>
        </div>
      </div>
    </div>`;
  }).join("");
}

/* ---------- Item events ---------- */
function bindItemEvents(){
  app.querySelectorAll(".item").forEach(node=>{
    const id = node.dataset.id;
    const projId = node.dataset.proj;
    const kind = node.dataset.kind;
    const proj = state.projects.find(p=>p.id===projId);
    if(!proj) return;
    const arr = kind==="schedule"?proj.schedule : kind==="buy"?proj.toBuy : proj.todos;
    const it = arr.find(x=>x.id===id);
    if(!it) return;

    node.querySelectorAll("[data-act]").forEach(btn=>{
      btn.addEventListener("click", e=>{
        e.stopPropagation();
        const act = btn.dataset.act;
        if(act==="toggle"){
          it.completed = !it.completed;
          it.completedAt = it.completed ? Date.now() : null;
          save(); render();
        } else if(act==="needs"){
          it.needsConfirmation = true; save(); render();
        } else if(act==="confirm"){
          it.needsConfirmation = false; save(); render();
        } else if(act==="delete"){
          if(!confirm("Move to Archive? You can restore it later from the Archived section.")) return;
          const idx = arr.findIndex(x=>x.id===id);
          if(idx<0) return;
          const [removed] = arr.splice(idx,1);
          // Soft-delete: route to the archive so the user can restore it.
          // (Permanent delete is a separate action available inside the archive.)
          removed._archivedAt = Date.now();
          const archKey = kind === "schedule" ? "archivedSchedule" : kind === "buy" ? "archivedToBuy" : "archivedTodos";
          proj[archKey] = proj[archKey] || [];
          proj[archKey].push(removed);
          save(); render();
          toast(`Moved to Archive.`);
        } else if(act==="edit"){
          openEditItemModal(proj, kind, it);
        } else if(act==="share"){
          openShareModal(proj, kind, it);
        } else if(act==="hide"){
          // Recipient dismisses a shared shadow item — adds its id to dismissedShared
          // and removes it from the local lists. It will NOT reappear on next sync
          // because migrate() filters dismissed shadow ids out of every project list.
          if(!Array.isArray(state.dismissedShared)) state.dismissedShared = [];
          if(!state.dismissedShared.includes(it.id)) state.dismissedShared.push(it.id);
          const idx = arr.findIndex(x=>x.id===id);
          if(idx>=0) arr.splice(idx,1);
          save(); render();
          toast(`Hidden from your view.`);
        }
      });
      btn.addEventListener("keydown", e=>{
        if((e.key===" "||e.key==="Enter") && btn.dataset.act==="toggle"){
          e.preventDefault(); btn.click();
        }
      });
    });
  });
}

/* ---------- Collectors ---------- */
function collectScheduleByDate(dateList){
  const set = new Set(dateList);
  const out=[];
  for(const p of state.projects){
    for(const it of p.schedule){
      if(set.has(it.date)) out.push({...it, _projId:p.id, _kind:"schedule"});
    }
  }
  return out;
}
function collectOverdue(){
  const t = todayISO();
  const out=[];
  for(const p of state.projects){
    for(const it of p.schedule){
      if(!it.completed && it.date < t) out.push({...it, _projId:p.id, _kind:"schedule"});
    }
  }
  return out;
}
function collectOpenTodos(){
  const out=[];
  for(const p of state.projects){
    for(const it of p.todos){
      if(!it.completed) out.push({...it, _projId:p.id, _kind:"todo"});
    }
  }
  return out;
}
function collectOpenToBuy(){
  const out=[];
  for(const p of state.projects){
    for(const b of p.toBuy){
      if(!b.completed) out.push({...b, _projId:p.id, _kind:"buy", _displayTitle:(b.qty?`${b.qty}× `:"")+b.title});
    }
  }
  return out;
}
function collectNeedsConfirmActive(){
  const out=[];
  for(const p of state.projects){
    for(const it of p.schedule){
      if(it.needsConfirmation && !it.completed && it.date >= todayISO()){
        out.push({...it, _projId:p.id, _kind:"schedule"});
      }
    }
    for(const it of p.todos){
      if(it.needsConfirmation && !it.completed){
        out.push({...it, _projId:p.id, _kind:"todo"});
      }
    }
  }
  return out;
}
function projectCounts(p){
  const t = todayISO();
  let today=0, upcoming=0, needs=0;
  for(const it of p.schedule){
    if(it.completed) continue;
    if(it.date===t) today++;
    else if(it.date>t) upcoming++;
    if(it.needsConfirmation) needs++;
  }
  for(const it of p.todos){ if(it.needsConfirmation && !it.completed) needs++; }
  return {
    today, upcoming,
    todos: p.todos.filter(x=>!x.completed).length,
    toBuy: p.toBuy.filter(x=>!x.completed).length,
    needs,
  };
}
function findProjectOf(item){
  for(const p of state.projects){
    if(p.schedule.includes(item) || p.todos.includes(item) || p.toBuy.includes(item)) return p;
  }
  return null;
}
function guessKind(it){
  if(it.date) return "schedule";
  if(it.qty!==undefined) return "buy";
  return "todo";
}
function scheduleSort(a,b){
  if(a.date!==b.date) return a.date.localeCompare(b.date);
  if(a.time && b.time) return a.time.localeCompare(b.time);
  if(a.time) return -1; if(b.time) return 1;
  return 0;
}
function isDeadlineSoon(d){
  if(!d) return false;
  const days = (parseISO(d) - parseISO(todayISO()))/DAY_MS;
  return days <= 14;
}
function daysUntil(d){
  const days = Math.round((parseISO(d) - parseISO(todayISO()))/DAY_MS);
  if(days===0) return "today";
  if(days===1) return "tomorrow";
  if(days<0) return `${-days} day${days===-1?"":"s"} overdue`;
  return `in ${days} days`;
}
function escapeHtml(s){
  return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function fmtHours(h){
  h = Number(h)||0;
  if(Number.isInteger(h)) return h+"h";
  return h.toFixed(2).replace(/\.?0+$/,"")+"h";
}

/* ---------- Punchlist ---------- */
function showPunchlist(){
  const t = todayISO();
  const horizon=[];
  for(let i=0;i<3;i++){
    horizon.push(todayISO(new Date(Date.now()+i*DAY_MS)));
  }
  const overdue = collectOverdue();
  const groups = {};
  for(const iso of horizon){
    const items = collectScheduleByDate([iso]).filter(x=>!x.completed);
    if(items.length) groups[iso]=items;
  }
  const needs = collectNeedsConfirmActive();
  const todos = collectOpenTodos();
  const toBuy = collectOpenToBuy();

  const wrap = document.createElement("div");
  wrap.className="punchlist";
  wrap.innerHTML = `
    <header>
      <div class="title">Punchlist · ${fmtLong(t)}</div>
      <div class="spacer" style="flex:1"></div>
      <button class="iconbtn" id="closePunch">Close</button>
    </header>
    <div class="scroll" id="punchBody"></div>
  `;
  document.body.appendChild(wrap);
  const body = wrap.querySelector("#punchBody");
  let html = "";

  if(overdue.length){
    html += `<h4 style="color:var(--danger)">Overdue</h4><ul>`;
    for(const it of overdue){
      const proj = state.projects.find(p=>p.id===it._projId);
      html += `<li><span class="pill">${escapeHtml(proj?.name||"")}</span>${escapeHtml(it.title)} — <em>${fmtShort(it.date)}</em>${it.needsConfirmation?` <span class="pill needs">needs confirm</span>`:""}</li>`;
    }
    html += `</ul>`;
  }

  for(const iso of horizon){
    const items = groups[iso];
    if(!items) continue;
    html += `<h4>${fmtLong(iso)} ${relLabel(iso)?`· ${relLabel(iso)}`:""}</h4><ul>`;
    items.sort((a,b)=>{
      if(a.time && b.time) return a.time.localeCompare(b.time);
      if(a.time) return -1; if(b.time) return 1;
      return 0;
    });
    for(const it of items){
      const proj = state.projects.find(p=>p.id===it._projId);
      html += `<li><span class="pill">${escapeHtml(proj?.name||"")}</span>${it.time?`<strong>${fmtTime12(it.time)}</strong> — `:""}${escapeHtml(it.title)}${it.needsConfirmation?` <span class="pill needs">needs confirm</span>`:""}</li>`;
    }
    html += `</ul>`;
  }

  if(needs.length){
    html += `<h4>Awaiting confirmation</h4><ul>`;
    for(const it of needs){
      const proj = state.projects.find(p=>p.id===it._projId);
      const when = it.date ? ` — ${fmtShort(it.date)}` : ` — to-do`;
      html += `<li><span class="pill">${escapeHtml(proj?.name||"")}</span>${escapeHtml(it.title)}${when}</li>`;
    }
    html += `</ul>`;
  }

  if(todos.length){
    html += `<h4>To-do</h4><ul>`;
    for(const it of todos){
      const proj = state.projects.find(p=>p.id===it._projId);
      html += `<li><span class="pill">${escapeHtml(proj?.name||"")}</span>${escapeHtml(it.title)}${it.needsConfirmation?` <span class="pill needs">needs confirm</span>`:""}</li>`;
    }
    html += `</ul>`;
  }

  if(toBuy.length){
    html += `<h4>To-buy</h4><ul>`;
    for(const it of toBuy){
      const proj = state.projects.find(p=>p.id===it._projId);
      const label = (it.qty?`${it.qty}× `:"") + it.title;
      html += `<li><span class="pill">${escapeHtml(proj?.name||"")}</span>${escapeHtml(label)}</li>`;
    }
    html += `</ul>`;
  }

  if(!html) html = `<p class="empty">Nothing on the punchlist for the next few days.</p>`;
  body.innerHTML = html;
  wrap.querySelector("#closePunch").addEventListener("click",()=>wrap.remove());
}

/* ---------- Time tracker ---------- */
function periodRange(period, anchorISO){
  const a = parseISO(anchorISO);
  let start, end;
  if(period==="day"){
    start = a; end = a;
  } else if(period==="week"){
    start = startOfWeek(a);
    end = addDays(start, 6);
  } else {
    start = startOfMonth(a);
    const tmp = new Date(start); tmp.setMonth(tmp.getMonth()+1); tmp.setDate(0);
    end = tmp;
  }
  return { start, end, startISO: todayISO(start), endISO: todayISO(end) };
}
function shiftPeriod(dir){
  const a = parseISO(timeAnchorISO);
  if(timePeriod==="day") a.setDate(a.getDate()+dir);
  else if(timePeriod==="week") a.setDate(a.getDate()+dir*7);
  else a.setMonth(a.getMonth()+dir);
  timeAnchorISO = todayISO(a);
}
function renderTime(){
  const myRole = sync.user && sync.user.role;
  const isMgr = myRole === "admin" || myRole === "manager";
  const { startISO, endISO } = periodRange(timePeriod, timeAnchorISO);
  const entries = state.timeEntries.filter(e => e.date >= startISO && e.date <= endISO);
  const totalHours = entries.reduce((s,e)=>s+(+e.hours||0),0);
  const byProj = {};
  for(const e of entries){ byProj[e.projectId] = (byProj[e.projectId]||0) + (+e.hours||0); }
  const byDay = {};
  for(const e of entries){ byDay[e.date] = (byDay[e.date]||0) + (+e.hours||0); }

  const label = timePeriod==="day"
    ? fmtLong(startISO)
    : timePeriod==="week"
      ? `${fmtShort(startISO)} – ${fmtShort(endISO)}`
      : fmtMonth(startISO);

  const projOptions = state.projects.map(p=>`<option value="${p.id}">${escapeHtml(p.name)}</option>`).join("");

  let projRowsHtml = "";
  const sortedProjIds = Object.keys(byProj).sort((a,b)=>byProj[b]-byProj[a]);
  const maxProj = Math.max(1, ...Object.values(byProj));
  for(const pid of sortedProjIds){
    const p = state.projects.find(x=>x.id===pid);
    const pname = p ? p.name : "(deleted project)";
    const pct = Math.round((byProj[pid]/maxProj)*100);
    projRowsHtml += `<div class="row">
      <span class="name">${escapeHtml(pname)}</span>
      <div class="bar-wrap"><div class="bar" style="width:${pct}%"></div></div>
      <span class="h">${fmtHours(byProj[pid])}</span>
    </div>`;
  }
  if(!projRowsHtml) projRowsHtml = `<div class="empty">No hours logged for this period.</div>`;

  let dailyHtml = "";
  if(timePeriod!=="day" && Object.keys(byDay).length){
    const dates = Object.keys(byDay).sort();
    dailyHtml = `<div class="h2">Daily breakdown</div><div class="proj-hours">`;
    const maxDay = Math.max(1, ...Object.values(byDay));
    for(const d of dates){
      const pct = Math.round((byDay[d]/maxDay)*100);
      dailyHtml += `<div class="row">
        <span class="name">${fmtShort(d)}</span>
        <div class="bar-wrap"><div class="bar" style="width:${pct}%"></div></div>
        <span class="h">${fmtHours(byDay[d])}</span>
      </div>`;
    }
    dailyHtml += `</div>`;
  }

  const sortedEntries = [...entries].sort((a,b)=>{
    if(a.date!==b.date) return b.date.localeCompare(a.date);
    return (b.createdAt||0) - (a.createdAt||0);
  });
  let entriesHtml = "";
  if(sortedEntries.length){
    entriesHtml = sortedEntries.map(e=>{
      const p = state.projects.find(x=>x.id===e.projectId);
      const pname = p ? p.name : "(deleted project)";
      return `<div class="time-entry" data-eid="${e.id}">
        <div class="body">
          <div class="title">${escapeHtml(pname)} — ${fmtShort(e.date)}</div>
          ${e.note?`<div class="meta">${escapeHtml(e.note)}</div>`:""}
        </div>
        <span class="hours">${fmtHours(e.hours)}</span>
        <button class="ghost" data-tact="edit">Edit</button>
        <button class="ghost danger" data-tact="delete">Delete</button>

    }).join("");
  } else {
    entriesHtml = `<div class="empty">No entries for this period.</div>`;
  }

  app.innerHTML = `

    <div class="period-toggle" role="tablist">
      <button data-period="day"${timePeriod==="day"?' class="active"':""}>Day</button>
      <button data-period="week"${timePeriod==="week"?' class="active"':""}>Week</button>

    <div class="stat-grid">

      <div class="stat-card">

      <div class="stat-card">

    ${dailyHtml}

        <button id="teAdd">Log</button>
      </div>
    </div>
    <div class="h2">Entries</div>
    ${entriesHtml}
    ${isMgr ? `
    <div class="h2">Team time <span class="tag">${escapeHtml(myRole)}</span></div>
    <div class="add-section">
      <div class="hint">Log time on behalf of any user. If they've already logged their own, it still shows in the report below — no need to re-enter.</div>

  app.querySelectorAll(".period-toggle button").forEach(b=>{
    b.addEventListener("click", ()=>{

  });
  document.getElementById("timePrev").addEventListener("click", ()=>{ shiftPeriod(-1); render(); });
  document.getElementById("timeNext").addEventListener("click", ()=>{ shiftPeriod(1); render(); });
  document.getElementById("timeToday").addEventListener("click", ()=>{ timeAnchorISO = todayISO(); render(); });
  document.getElementById("teAdd").addEventListener("click", ()=>{
    const pid = document.getElementById("teProj").value;
    const d = document.getElementById("teDate").value;
    const h = +document.getElementById("teHours").value;
    const n = document.getElementById("teNote").value.trim();
    if(!pid){ toast("Pick a project."); return; }

    if(!h || h<=0){ toast("Enter hours > 0."); return; }

    save(); render();

  app.querySelectorAll(".time-entry").forEach(node=>{

    const entry = state.timeEntries.find(x=>x.id===eid);
    if(!entry) return;
    node.querySelectorAll("[data-tact]").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        const act = btn.dataset.tact;
        if(act==="delete"){
          if(!confirm("Delete this time entry?")) return;
          state.timeEntries = state.timeEntries.filter(x=>x.id!==eid);
          save(); render();
        } else if(act==="edit"){
          openEditTimeModal(entry);

      });

  // Manager / admin: log time for any user + consolidated team report.
  if(isMgr){
    fetchUsersList().then(users=>{
      const sel = document.getElementById("mtUser");
      if(sel) sel.innerHTML = users.map(u=>`<option value="${escapeHtml(u)}">${escapeHtml(u)}</option>`).join("");
    }).catch(()=>{});
    const mtLog = document.getElementById("mtLog");
    if(mtLog) mtLog.addEventListener("click", async ()=>{

      }
    });
    loadTeamReport();
  }
}

async function loadTeamReport(){
  const el = document.getElementById("teamReport");
  if(!el) return;
  try{
    const entries = await getAllTime();
    if(!entries.length){
      el.innerHTML = `<div class="empty">No time logged by anyone yet.</div>`;
      return;
    }
    // Group: username -> { total, projs: { projectName -> hours } }
    const byUser = {};
    for(const e of entries){
      const u = byUser[e.username] = byUser[e.username] || { total:0, projs:{} };
      const h = +e.hours || 0;
      u.total += h;
      u.projs[e.projectName] = (u.projs[e.projectName] || 0) + h;
    }
    let html = "";
    for(const un of Object.keys(byUser).sort()){
      const u = byUser[un];
      html += `<div style="margin:12px 0 4px;font-weight:800">${escapeHtml(un)} — ${fmtHours(u.total)}</div>`;
      for(const pn of Object.keys(u.projs).sort()){
        html += `<div class="row">
          <span class="name" style="padding-left:12px">${escapeHtml(pn)}</span>
          <span class="h">${fmtHours(u.projs[pn])}</span>
        </div>`;
      }
    }
    el.innerHTML = html;
  }catch(e){
    el.innerHTML = `<div class="empty">Couldn't load team time: ${escapeHtml(e.message || String(e))}</div>`;
  }
}
